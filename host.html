<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game - 管理者画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>My Game - ホスト専用管理画面</h1>

    <div id="section-host">
        <h2>参加者名簿（ホスト画面）</h2>
        <button id="btn-clear-room">部屋のデータをリセット</button>
        
        <table border="1">
            <thead>
                <tr>
                    <th>入室順</th>
                    <th>プレイヤー名 (ID)</th>
                    <th>現在の役割</th>
                    <th>役割の変更（ホスト権限）</th>
                </tr>
            </thead>
            <tbody id="host-participant-list">
                </tbody>
        </table>
    </div>

    <script type="module" src="host_app.js"></script>
</body>
</html>
