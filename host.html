<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game - 管理者画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>My Game - ホスト専用管理画面</h1>

    <div id="section-host">
        <!-- 🚀最初から配置するサイコロ監視エリア -->
        <h2>最新のサイコロ出目（ホスト監視用）</h2>
        <div id="host-dice-monitor" style="font-size: 18px; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; background-color: #fafafa;">
            まだサイコロは振られていません
        </div>

        <!-- 💡手番設定用の入力欄（入室順）とボタン -->
        <div style="margin-bottom: 20px;">
            <input type="number" id="input-next-turn-order" placeholder="入室順を入力" min="1" style="font-size: 16px; padding: 5px; width: 120px;">
            <button id="btn-set-turn" style="font-size: 16px; padding: 5px 10px;">を手番にする</button>
        </div>

        <!-- 24マスの直線並び盤面 -->
        <h2>すごろく盤面（リアルタイム）</h2>
        <table border="2" cellspacing="5" cellpadding="10">
            <!-- 上段：0番マス（スタート）〜 11番マス -->
            <tr height="80">
                <td width="80" align="center" valign="middle" bgcolor="#ffeb3b">
                    <b>【0】スタート</b>
                    <div id="cell-0"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【1】</div><div id="cell-1"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【2】</div><div id="cell-2"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【3】</div><div id="cell-3"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【4】</div><div id="cell-4"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【5】</div><div id="cell-5"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【6】</div><div id="cell-6"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【7】</div><div id="cell-7"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【8】</div><div id="cell-8"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【9】</div><div id="cell-9"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【10】</div><div id="cell-10"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【11】</div><div id="cell-11"></div>
                </td>
            </tr>
            <!-- 下段：12番マス 〜 23番マス -->
            <tr height="80">
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【12】</div><div id="cell-12"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【13】</div><div id="cell-13"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【14】</div><div id="cell-14"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【15】</div><div id="cell-15"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【16】</div><div id="cell-16"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【17】</div><div id="cell-17"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【18】</div><div id="cell-18"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【19】</div><div id="cell-19"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【20】</div><div id="cell-20"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【21】</div><div id="cell-21"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【22】</div><div id="cell-22"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【23】</div><div id="cell-23"></div>
                </td>
            </tr>
        </table>

        <hr>

        <h2>参加者名簿（ホスト画面）</h2>
        <fieldset>
            <legend>退室管理</legend>
            <p>
                <label for="input-kick-order">退室者の番号: </label>
                <input type="number" id="input-kick-order" min="1" placeholder="例: 4" size="4">
                <button id="btn-kick-participant">退室させる</button>
            </p>
            <p>
                <button id="btn-clear-room">全員を退室させる</button>
            </p>
        </fieldset>
                    
        <table border="1" style="margin-top: 10px;">
            <thead>
                <tr>
                    <th>入室順</th>
                    <th>プレイヤー名 (ID)</th>
                    <th>現在の位置（マス）</th>
                </tr>
            </thead>
            <tbody id="host-participant-list">
            </tbody>
        </table>
    </div>

    <script type="module" src="host_app.js"></script>
</body>
</html>
