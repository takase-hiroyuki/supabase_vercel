<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game - 管理者画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>My Game - ホスト専用管理画面</h1>

    <div id="section-host">
        <!-- 🚀最初から配置するサイコロ監視エリア -->
        <h2>最新のサイコロ出目（ホスト監視用）</h2>
        <div id="host-dice-monitor" style="font-size: 18px; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; background-color: #fafafa;">
            まだサイコロは振られていません
        </div>

        <!-- 💡手番設定用の入力欄（入室順）とボタン -->
        <div style="margin-bottom: 20px;">
            <input type="number" id="input-next-turn-order" placeholder="入室順を入力" min="1" style="font-size: 16px; padding: 5px; width: 120px;">
            <button id="btn-set-turn" style="font-size: 16px; padding: 5px 10px;">を手番にする</button>
        </div>

        <!-- スタイルシートを使わず、HTMLの属性だけで3x3の盤面を表現 -->
        <h2>すごろく盤面（リアルタイム）</h2>
        <table border="2" cellspacing="5" cellpadding="10">
            <!-- 1行目：左上(3)、上中(2)、右上(1) -->
            <tr height="80">
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【3】左上</div>
                    <div id="cell-3"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【2】上中</div>
                    <div id="cell-2"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【1】右上</div>
                    <div id="cell-1"></div>
                </td>
            </tr>
            <!-- 2行目：左中(4)、真ん中（不使用）、right-center(0:スタート) -->
            <tr height="80">
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【4】左中</div>
                    <div id="cell-4"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#ffffff">
                    <!-- 真ん中の空きマス -->
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#ffeb3b">
                    <b>【0】スタート</b>
                    <div id="cell-0"></div>
                </td>
            </tr>
            <!-- 3行目：左下(5)、下中(6)、右下(7) -->
            <tr height="80">
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【5】left-down</div>
                    <div id="cell-5"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【6】下中</div>
                    <div id="cell-6"></div>
                </td>
                <td width="80" align="center" valign="middle" bgcolor="#f0f0f0">
                    <div>【7】右下</div>
                    <div id="cell-7"></div>
                </td>
            </tr>
        </table>

        <hr>

        <h2>参加者名簿（ホスト画面）</h2>
        
        <!-- 💡【追加】インデントを美しく整えた退室管理エリア -->
        <div style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; background-color: #f9f9f9;">
            <h4>参加者の個別退室管理</h4>
            <label for="input-kick-order">退室させる人の入室順 (番号): </label>
            <input type="number" id="input-kick-order" min="1" placeholder="例: 4" style="width: 60px; padding: 4px;">
            <button id="btn-kick-participant" style="background-color: #e53935; color: white; padding: 4px 8px; cursor: pointer;">
                指定したメンバーを退室させる
            </button>
        </div>
        
        <button id="btn-clear-room" style="margin-top: 15px;">部屋のデータをリセット</button>
        
        <table border="1" style="margin-top: 10px;">
            <thead>
                <tr>
                    <th>入室順</th>
                    <th>プレイヤー名 (ID)</th>
                    <th>現在の位置（マス）</th>
                </tr>
            </thead>
            <tbody id="host-participant-list">
            </tbody>
        </table>
    </div>

    <script type="module" src="host_app.js"></script>
</body>
</html>
