<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game - 管理者画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>My Game - ホスト専用管理画面</h1>

    <div id="section-host">
        <!-- 🚀最初から配置するサイコロ監視エリア -->
        <h2>最新のサイコロ出目（ホスト監視用）</h2>
        <div id="host-dice-monitor" style="font-size: 18px; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; background-color: #fafafa;">
            まだサイコロは振られていません
        </div>

        <!-- 💡手番設定用の入力欄（入室順）とボタン -->
        <div style="margin-bottom: 20px;">
            <input type="number" id="input-next-turn-order" placeholder="入室順を入力" min="1" style="font-size: 16px; padding: 5px; width: 120px;">
            <button id="btn-set-turn" style="font-size: 16px; padding: 5px 10px;">を手番にする</button>
        </div>

        <!-- 24マスの直線並び盤面（背景色なし） -->
        <h2>すごろく盤面（リアルタイム）</h2>
        <table border="2" cellspacing="5" cellpadding="10">
            <!-- 上段：0番マス（スタート）〜 11番マス -->
            <tr height="80">
                <td width="80" align="center" valign="middle">
                    <b>【0】スタート</b>
                    <div id="cell-0"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【1】</div><div id="cell-1"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【2】</div><div id="cell-2"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【3】</div><div id="cell-3"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【4】</div><div id="cell-4"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【5】</div><div id="cell-5"></div>
                </td>
                <td width="80" align="center" valign="middle">
                    <div>【6】</div><div id="cell-6"></div>
                </td>
                <td width="80" align="center" valign="middle">
